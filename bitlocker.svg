<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BitLocker 鍵の階層構造</title>
  <desc>VMK（ボリューム暗号化鍵）がFVEKを暗号化し、TPMと回復キーの両方がVMKを保護する構造</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="560" fill="#ffffff"/>

  <!-- Top note -->
  <text font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle" x="340" y="50">VMKは「2つの別々の暗号化コピー」としてディスクに保存される</text>
  <line x1="160" y1="58" x2="160" y2="138" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="520" y1="58" x2="520" y2="138" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- TPM (top left) - blue -->
  <rect x="60" y="140" width="200" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle" x="160" y="165">TPM チップ</text>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" text-anchor="middle" x="160" y="185">VMKの暗号化コピーを保持</text>

  <!-- Recovery key (top right) - coral -->
  <rect x="420" y="140" width="200" height="60" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle" x="520" y="165">48桁 回復キー</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" text-anchor="middle" x="520" y="185">別途VMKのコピーを復号</text>

  <!-- Arrow TPM -> VMK -->
  <path d="M210 200 L340 318" fill="none" stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle" x="248" y="265">VMKを復号</text>

  <!-- Arrow Recovery -> VMK -->
  <path d="M470 200 L340 318" fill="none" stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" text-anchor="middle" x="435" y="265">VMKを復号</text>

  <!-- VMK (middle center) - purple -->
  <rect x="230" y="320" width="220" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" x="340" y="345">VMK（ボリューム暗号鍵）</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" text-anchor="middle" x="340" y="365">FVEKを暗号化して守る鍵</text>

  <!-- Arrow VMK -> FVEK -->
  <line x1="340" y1="380" x2="340" y2="458" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="348" y="422">VMKでFVEKを復号</text>

  <!-- FVEK (bottom center) - teal -->
  <rect x="230" y="460" width="220" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" x="340" y="485">FVEK</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" x="340" y="505">ディスクを直接暗号化する鍵</text>

  <!-- Bottom note -->
  <text font-family="sans-serif" font-size="12" fill="#B4B2A9" text-anchor="middle" x="340" y="545">BitLocker Key Hierarchy</text>
</svg>
